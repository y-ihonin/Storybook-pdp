name: Deploy Storybook to AWS S3

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies and build Storybook
        run: |
          npm ci
          npm run build-storybook

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy Storybook to S3
        run: |
          aws s3 sync storybook-static/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "iframe.html"

          aws s3 cp storybook-static/index.html s3://${{ secrets.AWS_S3_BUCKET }}/index.html \
            --cache-control "no-cache, must-revalidate" \
            --content-type "text/html"

          aws s3 cp storybook-static/iframe.html s3://${{ secrets.AWS_S3_BUCKET }}/iframe.html \
            --cache-control "no-cache, must-revalidate" \
            --content-type "text/html"
